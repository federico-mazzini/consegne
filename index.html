<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Consegne Informatica</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f9f9f9;
    }

    h1 {
      color: #6a0dad;
      font-size: 3em;
      margin-bottom: 40px;
    }

    a {
      color: #6a0dad;
      font-size: 1.5em;
      text-decoration: none;
      border: 2px solid #6a0dad;
      padding: 10px 30px;
      border-radius: 8px;
      transition: all 0.3s ease;
    }

    a:hover {
      background-color: #6a0dad;
      color: white;
    }
  </style>
</head>
<body>
  <h1>Consegne Informatica</h1>
  <!-- il link verrà inserito qui tramite JS -->
  <div id="link-container"></div>

  <script src="link.js"></script>
</body>
</html>
